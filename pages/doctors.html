<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أطباؤنا - عيادة الشفاء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-nav sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-hospital text-white"></i>
                <span class="text-white fw-bold ms-1">عيادة الشفاء</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link text-white" href="../index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="specialties.html">التخصصات</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-semibold" href="doctors.html">أطباؤنا</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="appointment.html">حجز موعد</a></li>
                </ul>
                <a href="login.html" class="btn btn-outline-light rounded-5 btn-sm px-3">دخول</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div style="background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:60px 0 40px">
        <div class="container text-center text-white">
            <h1 class="fs-1 fw-bold mb-2">فريقنا الطبي</h1>
            <p class="opacity-75 fs-5 mb-4">نخبة من أفضل الأطباء المتخصصين في مختلف المجالات</p>
            <!-- فلاتر ديناميكية -->
            <div class="d-flex flex-wrap justify-content-center gap-2" id="filterBtns">
                <button class="filter-btn active" onclick="filterDoctors('all',this)">الكل</button>
            </div>
        </div>
    </div>

    <main class="container py-5">
        <div class="row g-4" id="doctorsGrid"></div>
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-person-x text-muted" style="font-size:4rem"></i>
            <p class="text-muted mt-3 fs-5">لا يوجد أطباء في هذا التخصص</p>
        </div>
    </main>

    <footer class="bg-nav py-3 text-center">
        <p class="text-white mb-0 small">© 2026 عيادة الشفاء. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true });</script>
    <script src="../js/doctors-data.js"></script>
    <script>
    let currentFilter = 'all';

    function defaultImg(name) {
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&size=300&background=1565C8&color=fff&bold=true&font-size=0.38`;
    }

    // بناء فلاتر التخصصات ديناميكياً
    function buildFilters() {
        const container = document.getElementById('filterBtns');
        SPECIALTIES.forEach(s => {
            if (!s.doctors.length) return;
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = s.name;
            btn.onclick = function() { filterDoctors(s.id, this); };
            container.appendChild(btn);
        });
    }

    // رسم الكروت
    function renderDoctors(filter = 'all') {
        const grid = document.getElementById('doctorsGrid');
        const empty = document.getElementById('emptyState');

        const allDoctors = SPECIALTIES.flatMap(s =>
            s.doctors.map(d => ({ ...d, specId: s.id, specName: s.name }))
        );

        const list = filter === 'all' ? allDoctors : allDoctors.filter(d => d.specId === filter);

        empty.classList.toggle('d-none', list.length > 0);

        grid.innerHTML = list.map((d, i) => `
            <div class="col-12 col-sm-6 col-lg-4" data-spec="${d.specId}" data-aos="fade-up" data-aos-delay="${(i % 3) * 100}">
                <div class="card doctor-card shadow-sm h-100">
                    <img src="${d.img || defaultImg(d.name)}" alt="${d.name}"
                         style="height:260px;object-fit:cover;object-position:top center;width:100%"
                         onerror="this.src='${defaultImg(d.name)}'">
                    <div class="card-body text-center p-4">
                        <span class="spec-badge mb-2 d-inline-block">${d.specName}</span>
                        <h5 class="fw-bold mt-2 mb-1">${d.name}</h5>
                        <p class="text-muted small mb-3">${d.title}${d.exp ? ' — ' + d.exp : ''}</p>
                        <a href="appointment.html?doctor=${d.id}"
                           class="btn btn-sm w-100 text-white rounded-5"
                           style="background:var(--secondary-blue)">احجز موعد</a>
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <i class="bi bi-facebook fs-5" style="color:var(--primary-blue);cursor:pointer"></i>
                            <i class="bi bi-whatsapp fs-5 text-success" style="cursor:pointer"></i>
                            <i class="bi bi-envelope-at-fill fs-5" style="color:var(--primary-blue);cursor:pointer"></i>
                        </div>
                    </div>
                </div>
            </div>`).join('');

        AOS.refresh();
    }

    function filterDoctors(spec, btn) {
        currentFilter = spec;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDoctors(spec);
    }

    buildFilters();
    renderDoctors();
    </script>
</body>
</html>
